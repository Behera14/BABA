<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- 📱 Mobile Fix -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday BABA ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* Slides */
.slide {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  opacity: 0;
  transition: opacity 1s ease-in-out;
  padding: 20px;
}

.active {
  opacity: 1;
}

/* Backgrounds */
.slide1 { background: linear-gradient(to right, #fceabb, #f8b500); }
.slide2 { background: linear-gradient(to right, #ff9a9e, #fecfef); }
.slide3 { background: linear-gradient(to right, #a1c4fd, #c2e9fb); }
.slide4 { background: linear-gradient(to right, #d4fc79, #96e6a1); }
.slide5 { background: linear-gradient(to right, #fbc2eb, #a6c1ee); }
.slide6 { background: linear-gradient(to right, #fddb92, #d1fdff); }
.slide7 { background: linear-gradient(to right, #ffecd2, #fcb69f); }

/* Text (Responsive) */
h1 {
  font-size: 7vw;
  color: #333;
}

p {
  font-size: 4.5vw;
  max-width: 90%;
  color: #444;
}

/* Image (Responsive) */
img {
  width: 85%;
  max-width: 350px;
  height: auto;
  border-radius: 20px;
  margin-top: 20px;
  object-fit: cover;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: transform 0.5s;
}

img:hover {
  transform: scale(1.05);
}

/* Hearts */
.heart {
  position: absolute;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body onclick="nextSlide()">

<!-- 🎵 Music -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<!-- Slide 1 -->
<div class="slide slide1 active">
  <h1 id="typing"></h1>
  <p id="typing2"></p>
</div>

<!-- Slide 2 -->
<div class="slide slide2">
  <h1>Thank You BABA 🙏</h1>
  <p>For your unconditional love and endless support 💛</p>
  <img src="photo1.jpg">
</div>

<!-- Slide 3 -->
<div class="slide slide3">
  <h1>You Always Make Me Smile 😊</h1>
  <img src="photo2.jpg">
</div>

<!-- Slide 4 -->
<div class="slide slide4">
  <h1>I Am So Lucky to Have You 💫</h1>
  <img src="photo3.jpg">
</div>

<!-- Slide 5 -->
<div class="slide slide5">
  <h1>My Inspiration – You & Mumma 💖</h1>
  <img src="photo4.jpg">
</div>

<!-- Slide 6 -->
<div class="slide slide6">
  <h1>I Love You So Much BABA ❤️</h1>
  <p>Stay happy and healthy always 💛</p>
  <img src="photo5.jpg">
</div>

<!-- Slide 7 -->
<div class="slide slide7">
  <h1>Forever Grateful to Be Your Child 🙏</h1>
  <img src="photo6.jpg">
</div>

<script>
let current = 0;
const slides = document.querySelectorAll(".slide");

function nextSlide() {
  slides[current].classList.remove("active");
  current = (current + 1) % slides.length;
  slides[current].classList.add("active");

  document.getElementById("bgMusic").play();
}

/* Typing Animation */
const text1 = "Happy Birthday BABA ❤️";
const text2 = "You are my biggest strength and my hero 💛";

let i = 0;
let j = 0;

function typeText() {
  if (i < text1.length) {
    document.getElementById("typing").innerHTML += text1.charAt(i);
    i++;
    setTimeout(typeText, 80);
  } else {
    typeText2();
  }
}

function typeText2() {
  if (j < text2.length) {
    document.getElementById("typing2").innerHTML += text2.charAt(j);
    j++;
    setTimeout(typeText2, 50);
  }
}

typeText();

/* Floating hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 300);

/* Final Surprise */
setTimeout(() => {
  alert("BABA ❤️ Thank you for everything. I love you forever 💛");
}, 20000);
</script>

</body>
</html>
